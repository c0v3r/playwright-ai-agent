- name: Gemini AI Reviewer
        uses: anc95/ChatGPT-CodeReview@v1.0.15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # CAMBIO 1: Probemos con la URL base directa de Google
          OPENAI_API_BASE: https://generativelanguage.googleapis.com/v1beta/openai
          # CAMBIO 2: Usemos el nombre de modelo que Google reconoce vía OpenAI
          MODEL: "gpt-4o" 
        with:
          debug: true
          # CAMBIO 3: Quitamos el filtro regex complejo por ahora para que no haya dudas
          review_item_filter: ".*"